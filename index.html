<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PF Brasil - Gestão de Verbas</title>
    
    <!-- Configuração PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <!-- Bibliotecas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useCallback } = React;
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBSXiZWea-cXvztxKv28YggNOJioqsBobU",
            authDomain: "pf-verbas.firebaseapp.com",
            projectId: "pf-verbas",
            storageBucket: "pf-verbas.firebasestorage.app",
            messagingSenderId: "1048653186555",
            appId: "1:1048653186555:web:2b7945d5e1cf3998b5f75e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLLECTION_NAME = 'pf_budget_oficial_2026';

        // 1. LISTA DE ESTRUTURAS (ATUALIZADA EM MAIÚSCULAS E COM NOVOS NOMES)
        const TEAMS = [
            "DISTRITAL RIO TOTAL",
            "DISTRITAL MG/ES",
            "DISTRITAL NNE",
            "DISTRITAL SPC1",
            "DISTRITAL SPC2",
            "DISTRITAL SPI/BSB",
            "DISTRITAL SPI/GNY",
            "DISTRITAL SUL",
            "GERENTE NACIONAL DE VISITAÇÃO MÉDICA",
            "GERENTE NACIONAL DE EXECUÇÃO",
            "DIRETORIA (MATRIZ)"
        ];

        // 2. RELAÇÃO COMPLETA DE REPRESENTANTES (CHAVES ATUALIZADAS)
        const REPRESENTATIVES = {
            "DISTRITAL RIO TOTAL": [
                "CARLOS OTAVIO", "LIVIA NUNES DO AMARAL", "GUSTAVO GOMES DE ARAGAO PEDRA E CAL", 
                "VALERIA DIAS DA COSTA", "THAIS SANTANNA RIBEIRO", "CARLOS EDUARDO DO NASCIMENTO SOARES",
                "FERNANDA DE JESUS NASCIMENTO", "SIMONE LIMA DE CARVALHO", "FELIPE GOMES",
                "ARTHUR MARILAC FERREIRA", "ELIZABETH LIMA DA SILVA", "CARINA CARVALHO DIAS DE AMORIM",
                "ROSIMERE MARIA DA SILVA FALCAO", "DEBORAH DE ALMEIDA LEITE PINTO DE LACERDA",
                "ISIS DE OLIVEIRA ALVES", "PATRICIA MEIRE DE SOUZA IAMIM SILVA"
            ],
            "DISTRITAL MG/ES": [
                "CALEBE MIRANDA WANDERLEY", "SIMONE SOUSA DA SILVA GENOVEZ", "HELOISA DE BARROS",
                "MARSEILLE COSTA DE CARVALHO", "JESSICA KAROLINE MOREIRA MARCELINO", "AMANDA DE OLIVEIRA MOURA",
                "IZABELA SALES ROCHA DELUCCA", "PAULO MARCIO TOFANI DE MELLO JUNIOR", "KENIA OLIVEIRA CANHESTRO",
                "KELLY CRISTINA PEREIRA DE ARAUJO"
            ],
            "DISTRITAL NNE": [
                "SUELLEN VASCONCELOS", "LEILA MARIA BRIZENO ALVES SETUBAL", "JOSE BERNARDO SOUZA SILVA OLIVEIRA",
                "FERNANDO DA SILVA FORTES DA COSTA JUNIOR", "ANA ROSA FERREIRA DE MELO VENTURA",
                "RICARDO JOSE COELHO DE ALBUQUERQUE", "MARCIA CATERINE MELO LIMA DA ROCHA",
                "FABIANA CRISTINA PINTO TETI MAGALHAES DE MORAES", "FLAVIA MARIA CAVALCANTI MADUREIRA",
                "RODRIGO DE OLIVEIRA WANDERLEY", "KALIANNE FELIX", "LUIS PINHEIRO", 
                "JANAINA BEMMUYAL PARENTE SANTOS", "SANDRINE AGNES LUCIE YOUST"
            ],
            "DISTRITAL SPC1": [
                "SIDNEI DE SANTIS", "VAGO VM", "PAULA NERY ARAGAO", "VALDIRENE COSME DA CONCEICAO DE FLOR",
                "KARINA PEREIRA SILVA ACTIS", "RAFAEL MENDES PEREIRA", "MONIQUE CAROLINA MARTINS GONCALVES",
                "ROBERTA SALES GADELHA", "SHEILA SANTANA FULNAZARI", "GRAZIELA VICENTE TORRECILLAS",
                "PAMELA ARAUJO DA COSTA"
            ],
            "DISTRITAL SPC2": [
                "CHRISTIANE RODRIGUES", "SILVIA REGINA LAZINHO", "GISELE MAKUL BIANCO", 
                "MARCEL OLMO FERNANDES BRANCO", "LUCIENE DE SOUZA", "GISLAINE MONTINI BIZINOTTI",
                "KARINA CAVALCANTI", "AMANDA CARDOSO SANTANA", "VAGO VM", "FLAVIA LUIZA CARDOSO LIUTTI",
                "GABRIELA ARAUJO DE PIERI ZAMPIERI", "NIVALDO SABINO", "VANESSA GARCIA DE OLIVEIRA",
                "SEBASTIAO ARAUJO ALMEIDA"
            ],
            "DISTRITAL SPI/BSB": [
                "CARLOS DIAS", "LUCIANA ARAUJO DE OLIVEIRA CAMPOS", "LARISSA ALMEIDA FERNANDES",
                "MARIANA LOBO MOREIRA", "LUCILIA CIBELE DE OLIVEIRA", "GELIANE DE LIMA",
                "KARINA APARECIDA PADILHA MOTA", "CRISTIANO CARVALHO DO NASCIMENTO",
                "DOUGLAS RODRIGO MUNHOZ DOMINGOS FIOCHI", "ELIS CRISTINA FURQUIM SILVA",
                "BRUNO CAETANO FELIX", "CLAYLTON DE SOUZA", "KELLY FABIANE DA SILVA"
            ],
            "DISTRITAL SPI/GNY": [
                "JACQUELINE MENEZES", "LINDA LUCIA DE SOUSA ALVES OLIVEIRA", "LADY MARY DE SOUZA ALMEIDA LINHARES",
                "PAOLA FERNANDA DA SILVA MOSCOSO DE BARROS", "VERA ALICE BEVEVINO DIAS DE MORAES RIGHETI",
                "CLARISSA GUTTIERREZ", "SILVIA HILARIO SANTOS", "GIOVANA SALAB DEPOLLI",
                "ARYADINE CARDOSO DE SOUZA", "ANTONIO MARCOS SHIMAZAKI DA SILVA", "DANIEL STEFANI DO NASCIMENTO"
            ],
            "DISTRITAL SUL": [
                "MARIANE GONCALVES", "LIEDER VARELA DIAS", "IZADORA GIMENES QUEVEDO",
                "TATIANA RODRIGUES DA FONSECA", "MEIRE TEREZINHA LEMES FERNANDES", "LAURO FERREIRA JUNIOR",
                "JULIANA STEFANIE OLIVEIRA", "THIAGO TOMAZZONI FERRARI", "TATIANE FERRARI", "DANNY MELO PEREIRA"
            ],
            "GERENTE NACIONAL DE VISITAÇÃO MÉDICA": ["BRUNO JORGE"],
            "GERENTE NACIONAL DE EXECUÇÃO": ["GUSTAVO LIMA"],
            "DIRETORIA (MATRIZ)": ["CARLOS OTAVIO"]
        };

        const ADMIN_USERS = {
            "8888": { name: "CARLOS OTÁVIO", isGeneral: true, team: "DIRETORIA (MATRIZ)" },
            "1001": { name: "GESTOR RIO", isGeneral: false, team: "DISTRITAL RIO TOTAL" },
            "1002": { name: "GESTOR MG", isGeneral: false, team: "DISTRITAL MG/ES" }
        };

        const CATEGORIES = ['CAT 1', 'CAT 2', 'CAT 3', 'CAT 4'];
        const ACTION_TYPES = ['Dias de produto', 'Presente', 'Refeição', 'Congresso', 'Organização de amostras'];

        const App = () => {
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('form'); 
            const [status, setStatus] = useState({ type: '', msg: '' });
            const [currentAdmin, setCurrentAdmin] = useState(null);
            const [pinInput, setPinInput] = useState('');
            const [adminTab, setAdminTab] = useState('reports'); 
            const [adminGeneralFilter, setAdminGeneralFilter] = useState('ALL');
            const [deleteTarget, setDeleteTarget] = useState(null);

            const [formData, setFormData] = useState({
                team: '', requesterName: '', doctorName: '', crm: '', category: '', actionType: '', value: '', observations: ''
            });

            // ÍCONE DINÂMICO
            useEffect(() => {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                if (ctx) {
                    const grad = ctx.createLinearGradient(0, 0, 1024, 1024);
                    grad.addColorStop(0, '#059669'); grad.addColorStop(1, '#10b981');
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.roundRect(0, 0, 1024, 1024, 200); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = 'italic bold 550px serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('PF', 512, 512 + 40);
                    const iconUrl = canvas.toDataURL('image/png');
                    let link = document.querySelector('link[rel="apple-touch-icon"]') || document.createElement('link');
                    link.rel = 'apple-touch-icon'; link.href = iconUrl; document.head.appendChild(link);
                }
            }, []);

            const notify = useCallback((msg, type = 'success') => {
                setStatus({ type, msg });
                setTimeout(() => setStatus({ type: '', msg: '' }), 4000);
            }, []);

            useEffect(() => {
                signInAnonymously(auth).catch(() => notify("Erro de login", "error"));
                return onAuthStateChanged(auth, setUser);
            }, [notify]);

            useEffect(() => {
                if (!user) return;
                setLoading(true);
                const colRef = collection(db, COLLECTION_NAME);
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => {
                        const d = doc.data();
                        let date = new Date();
                        if (d.createdAt) date = d.createdAt.toDate ? d.createdAt.toDate() : new Date(d.createdAt);
                        return { id: doc.id, ...d, createdAt: date };
                    });
                    setEntries([...data].sort((a, b) => b.createdAt - a.createdAt));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const parseCurrency = useCallback((valStr) => {
                if (!valStr) return 0;
                const clean = String(valStr).replace(/\./g, '').replace(',', '.');
                const n = parseFloat(clean);
                return isNaN(n) ? 0 : n;
            }, []);

            const filteredEntries = useMemo(() => {
                if (!currentAdmin) return [];
                let list = entries;
                if (currentAdmin.isGeneral) {
                    if (adminGeneralFilter === 'MINE') list = entries.filter(e => e.team === currentAdmin.team);
                    else if (adminGeneralFilter !== 'ALL') list = entries.filter(e => e.team === adminGeneralFilter);
                } else {
                    list = entries.filter(e => e.team === currentAdmin.team);
                }
                return list;
            }, [entries, currentAdmin, adminGeneralFilter]);

            const countEntries = filteredEntries.length;
            const totalInvested = useMemo(() => filteredEntries.reduce((acc, curr) => acc + parseCurrency(curr.value), 0), [filteredEntries, parseCurrency]);

            const statsByTeam = useMemo(() => {
                const groups = filteredEntries.reduce((acc, curr) => {
                    const team = curr.team || "Sem Estrutura";
                    if (!acc[team]) acc[team] = { total: 0, count: 0 };
                    acc[team].total += parseCurrency(curr.value);
                    acc[team].count += 1;
                    return acc;
                }, {});
                return Object.entries(groups).map(([name, data]) => ({ name, ...data })).sort((a, b) => b.total - a.total);
            }, [filteredEntries, parseCurrency]);

            const statsByUser = useMemo(() => {
                const groups = filteredEntries.reduce((acc, curr) => {
                    const name = curr.requesterName || "N/A";
                    if (!acc[name]) acc[name] = { total: 0, count: 0 };
                    acc[name].total += parseCurrency(curr.value);
                    acc[name].count += 1;
                    return acc;
                }, {});
                return Object.entries(groups).map(([name, data]) => ({ name, ...data })).sort((a, b) => b.total - a.total);
            }, [filteredEntries, parseCurrency]);

            const maxTeamTotal = statsByTeam.length > 0 ? statsByTeam[0].total : 1;
            const maxUserTotal = statsByUser.length > 0 ? statsByUser[0].total : 1;

            const getBarWidth = (val, max) => {
                if (!max || max <= 0) return '0%';
                const p = (val / max) * 100;
                return `${Math.min(100, Math.max(0, p))}%`;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { team, requesterName, doctorName, value, observations, crm, category, actionType } = formData;
                if (!team || !requesterName || !doctorName || !value || !observations || !crm || !category || !actionType) {
                    return alert("Por favor, preencha todos os campos obrigatórios.");
                }
                try {
                    await addDoc(collection(db, COLLECTION_NAME), { ...formData, userId: user.uid, createdAt: new Date() });
                    setFormData({ ...formData, requesterName: '', doctorName: '', crm: '', value: '', observations: '', category: '', actionType: '' });
                    notify("Registrado com sucesso!");
                    setView('history');
                } catch (err) { alert("Erro ao gravar: " + err.message); }
            };

            const confirmDelete = async () => {
                if (!deleteTarget) return;
                const targetId = deleteTarget.id;
                try {
                    setEntries(prev => prev.filter(e => e.id !== targetId));
                    setDeleteTarget(null);
                    await deleteDoc(doc(db, COLLECTION_NAME, targetId));
                    notify("Registro removido com sucesso.");
                } catch (err) { alert("Erro ao excluir: " + err.message); }
            };

            const logoutAdmin = () => { setCurrentAdmin(null); setPinInput(''); };
            const currentReps = REPRESENTATIVES[formData.team] || [];

            return (
                <div className="min-h-screen bg-slate-100 pb-24 text-slate-900 font-sans">
                    
                    {/* MODAL DE CONFIRMAÇÃO DE EXCLUSÃO */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-in fade-in duration-200">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setDeleteTarget(null)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 animate-in zoom-in-95 border border-slate-100">
                                <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <i className="ph-fill ph-warning-octagon text-4xl"></i>
                                </div>
                                <h3 className="text-xl font-black text-slate-800 text-center mb-2 tracking-tight uppercase">Confirmar Exclusão?</h3>
                                <p className="text-sm text-slate-500 text-center mb-6 italic">
                                    Deseja apagar o registro de <strong className="text-slate-800">{deleteTarget.doctorName}</strong> (R$ {deleteTarget.value})?
                                </p>
                                <div className="space-y-3">
                                    <button onClick={confirmDelete} className="w-full bg-rose-600 text-white font-black py-4 rounded-2xl active:scale-95 transition-all shadow-lg uppercase">Sim, Apagar Agora</button>
                                    <button onClick={() => setDeleteTarget(null)} className="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl active:scale-95 transition-all uppercase">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="sticky top-0 z-50 bg-slate-900 p-4 border-b border-slate-800 shadow-xl text-white">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-emerald-500 rounded-xl flex items-center justify-center font-black italic shadow-lg">PF</div>
                                <div>
                                    <h1 className="text-sm font-black tracking-tight uppercase leading-none">Pierre Fabre</h1>
                                    <p className="text-[9px] text-emerald-400 font-bold tracking-[0.3em] uppercase mt-1">Corporate Brasil</p>
                                </div>
                            </div>
                            <i className="ph-bold ph-file-csv text-emerald-400 text-xl cursor-pointer"></i>
                        </div>
                    </header>

                    {status.msg && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-emerald-900 text-emerald-100 px-6 py-3 rounded-full shadow-2xl border border-emerald-700 font-bold text-xs animate-bounce uppercase">
                            {status.msg}
                        </div>
                    )}

                    <main className="max-w-md mx-auto p-4">
                        {view === 'form' && (
                            <div className="bg-white rounded-3xl p-6 shadow-2xl border border-slate-100 animate-in fade-in zoom-in-95">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                                    <i className="ph-bold ph-plus-circle text-emerald-500"></i> Nova Solicitação
                                </h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-widest italic">Sua Estrutura</label>
                                        <select 
                                            value={formData.team} 
                                            onChange={e => setFormData({...formData, team: e.target.value, requesterName: ''})} 
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500 active:scale-[0.98] transition-all uppercase"
                                        >
                                            <option value="">Selecione sua Estrutura...</option>
                                            {TEAMS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-widest italic">Seu Nome (Solicitante)</label>
                                        {currentReps.length > 0 ? (
                                            <select 
                                                value={formData.requesterName} 
                                                onChange={e => setFormData({...formData, requesterName: e.target.value})} 
                                                className="w-full p-4 bg-emerald-50 border border-emerald-200 rounded-2xl font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500 transition-all shadow-inner uppercase"
                                            >
                                                <option value="">Escolha seu nome da lista...</option>
                                                {currentReps.map(name => <option key={name} value={name}>{name}</option>)}
                                                <option value="OUTRO">OUTRO (Digitar manualmente)</option>
                                            </select>
                                        ) : (
                                            <input 
                                                value={formData.requesterName} 
                                                onChange={e => setFormData({...formData, requesterName: e.target.value})} 
                                                placeholder={formData.team ? "DIGITE SEU NOME COMPLETO" : "ESCOLHA A ESTRUTURA PRIMEIRO"} 
                                                disabled={!formData.team}
                                                className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs outline-none uppercase" 
                                            />
                                        )}
                                        {formData.requesterName === 'OUTRO' && (
                                            <input 
                                                onChange={e => setFormData({...formData, requesterName: e.target.value})} 
                                                placeholder="DIGITE SEU NOME COMPLETO" 
                                                className="w-full p-4 mt-2 bg-white border-2 border-emerald-400 rounded-2xl font-bold text-xs outline-none animate-in slide-in-from-top-2 uppercase" 
                                            />
                                        )}
                                    </div>

                                    <input value={formData.doctorName} onChange={e => setFormData({...formData, doctorName: e.target.value})} placeholder="NOME DO MÉDICO / DESTINATÁRIO" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs outline-none focus:ring-2 focus:ring-emerald-500 transition-all uppercase" />
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <input value={formData.crm} onChange={e => setFormData({...formData, crm: e.target.value})} placeholder="CRM/UF" className="p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-xs outline-none uppercase focus:ring-2 focus:ring-emerald-500 transition-all" />
                                        <input value={formData.value} onChange={e => {
                                            let v = e.target.value.replace(/\D/g, "");
                                            v = (Number(v) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                                            setFormData({...formData, value: v});
                                        }} placeholder="R$ 0,00" className="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl font-black text-emerald-800 text-xs outline-none focus:ring-2 focus:ring-emerald-500 transition-all" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="p-4 bg-slate-50 border border-slate-200 rounded-2xl text-[11px] font-bold focus:ring-2 focus:ring-emerald-500 transition-all uppercase">
                                            <option value="">Categoria...</option>
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <select value={formData.actionType} onChange={e => setFormData({...formData, actionType: e.target.value})} className="p-4 bg-slate-50 border border-slate-200 rounded-2xl text-[11px] font-bold focus:ring-2 focus:ring-emerald-500 transition-all uppercase">
                                            <option value="">Ação...</option>
                                            {ACTION_TYPES.map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>

                                    <textarea value={formData.observations} onChange={e => setFormData({...formData, observations: e.target.value})} placeholder="DETALHE A AÇÃO AQUI..." rows="3" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-medium outline-none focus:ring-2 focus:ring-emerald-500 transition-all uppercase" />
                                    <button type="submit" className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-[0.96] transition-all flex items-center justify-center gap-2 uppercase text-sm">
                                        <i className="ph-bold ph-check-circle text-emerald-400 text-lg"></i> Registrar solicitação
                                    </button>
                                </form>
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">Feed de Atividades</h2>
                                    <span className="bg-slate-200 text-slate-600 text-[10px] font-black px-2 py-1 rounded-md">{entries.length} LANÇAMENTOS</span>
                                </div>
                                {entries.length === 0 ? (
                                    <div className="bg-white p-12 rounded-3xl text-center border border-dashed border-slate-300 italic text-slate-400 font-bold uppercase">Sem registros.</div>
                                ) : (
                                    entries.map(e => (
                                        <div key={e.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:scale-[0.98] transition-all">
                                            <div className="min-w-0 pr-4">
                                                <span className="text-[9px] font-black text-emerald-600 uppercase bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">{e.team}</span>
                                                <h3 className="font-bold text-slate-800 text-sm truncate mt-1 uppercase">{e.doctorName}</h3>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase truncate">{e.requesterName} • {e.actionType}</p>
                                            </div>
                                            <div className="text-right shrink-0">
                                                <p className="font-black text-slate-900 text-sm uppercase">R$ {e.value}</p>
                                                <p className="text-[9px] text-slate-400 font-bold">{e.createdAt.toLocaleDateString()}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="animate-in fade-in duration-500">
                                {!currentAdmin ? (
                                    <div className="bg-white p-8 rounded-3xl shadow-2xl text-center border border-slate-100 mt-10">
                                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                            <i className="ph-fill ph-shield-check text-4xl"></i>
                                        </div>
                                        <h2 className="text-xl font-black text-slate-800 mb-2 tracking-tight italic uppercase">Portal do Gestor</h2>
                                        <form onSubmit={e => {
                                            e.preventDefault();
                                            const pin = pinInput.trim();
                                            if (ADMIN_USERS[pin]) { setCurrentAdmin(ADMIN_USERS[pin]); setPinInput(''); } else { alert("PIN Incorreto"); }
                                        }} className="space-y-4">
                                            <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="PIN" className="w-full p-5 bg-slate-100 rounded-2xl text-center text-3xl font-black tracking-[0.5em] outline-none border-2 border-transparent focus:border-emerald-500 uppercase" maxLength={6} />
                                            <button type="submit" className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg uppercase">Entrar no Painel</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-slate-900 text-white p-5 rounded-3xl shadow-xl flex justify-between items-center transition-all active:scale-[0.98]">
                                            <div>
                                                <p className="text-[9px] font-black text-emerald-400 uppercase tracking-widest leading-none mb-1 italic">Gestão {currentAdmin.isGeneral ? "Brasil" : "Regional"}</p>
                                                <h3 className="font-bold text-sm tracking-tight uppercase">{currentAdmin.name}</h3>
                                            </div>
                                            <button onClick={logoutAdmin} className="text-[10px] font-black uppercase bg-slate-800 text-slate-400 px-3 py-2 rounded-xl active:scale-90 shadow-md">Sair</button>
                                        </div>

                                        <div className="flex bg-slate-200 p-1 rounded-2xl shadow-inner text-center">
                                            <button onClick={() => setAdminTab('reports')} className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${adminTab === 'reports' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>Relatórios</button>
                                            <button onClick={() => setAdminTab('manage')} className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${adminTab === 'manage' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-500'}`}>Controle</button>
                                        </div>

                                        {adminTab === 'reports' ? (
                                            <div className="space-y-6 animate-in slide-in-from-right-4 duration-300">
                                                {currentAdmin.isGeneral && (
                                                    <select value={adminGeneralFilter} onChange={e => setAdminGeneralFilter(e.target.value)} className="w-full p-3 bg-slate-900 text-white rounded-xl font-bold text-[11px] outline-none shadow-lg active:scale-[0.98] transition-all uppercase">
                                                        <option value="ALL">🌎 VISÃO GERAL BRASIL</option>
                                                        <option value="MINE">👤 MINHA EQUIPE</option>
                                                        {TEAMS.map(t => <option key={t} value={t}>📍 {t}</option>)}
                                                    </select>
                                                )}

                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 active:scale-[0.96] transition-all">
                                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Verba Utilizada</p>
                                                        <h4 className="text-lg font-black text-emerald-600 leading-none">R$ {Number(totalInvested).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</h4>
                                                    </div>
                                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 text-right active:scale-[0.96] transition-all">
                                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Lançamentos</p>
                                                        <h4 className="text-2xl font-black text-slate-800 leading-none">{countEntries}</h4>
                                                    </div>
                                                </div>

                                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                                    <h3 className="text-[10px] font-black text-slate-800 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                                                        <i className="ph-bold ph-map-pin text-emerald-500 text-lg"></i> Ranking por Estrutura
                                                    </h3>
                                                    <div className="space-y-5">
                                                        {statsByTeam.map((s, i) => (
                                                            <div key={i} className="space-y-2 animate-in slide-in-from-left-2 duration-300">
                                                                <div className="flex justify-between text-[11px] font-bold">
                                                                    <span className="text-slate-600 truncate pr-4 uppercase">{s.name}</span>
                                                                    <span className="text-emerald-700 font-black shrink-0">R$ {Number(s.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                                                                </div>
                                                                <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner">
                                                                    <div className="bg-emerald-500 h-full rounded-full transition-all duration-1000" style={{ width: getBarWidth(s.total, maxTeamTotal) }}></div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                                    <h3 className="text-[10px] font-black text-slate-800 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                                                        <i className="ph-bold ph-users text-blue-500 text-lg"></i> Ranking por Solicitante
                                                    </h3>
                                                    <div className="space-y-5">
                                                        {statsByUser.map((s, i) => (
                                                            <div key={i} className="space-y-2 animate-in slide-in-from-left-2 duration-300">
                                                                <div className="flex justify-between text-[11px] font-bold">
                                                                    <span className="text-slate-600 truncate pr-4 uppercase">{s.name}</span>
                                                                    <span className="text-slate-900 font-black shrink-0">R$ {Number(s.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                                                                </div>
                                                                <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner">
                                                                    <div className="bg-blue-500 h-full rounded-full transition-all duration-1000" style={{ width: getBarWidth(s.total, maxUserTotal) }}></div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            /* ABA DE CONTROLE (ONDE ESTÁ A LIXEIRA) */
                                            <div className="space-y-4 animate-in slide-in-from-left-4 duration-300">
                                                <div className="bg-rose-50 border border-rose-100 p-4 rounded-2xl flex gap-3 shadow-sm italic text-rose-700 text-[10px] font-bold uppercase leading-tight">
                                                    <i className="ph-fill ph-warning-circle text-rose-500 text-xl shrink-0"></i>
                                                    Moderação: A exclusão é definitiva e atualiza o contador imediatamente.
                                                </div>
                                                {filteredEntries.length === 0 ? (
                                                    <p className="text-center p-10 text-xs text-slate-400 font-bold uppercase italic tracking-widest">Nenhum registro para gerir</p>
                                                ) : (
                                                    filteredEntries.map(e => (
                                                        <div key={e.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:scale-[0.98] transition-all">
                                                            <div className="min-w-0 pr-4">
                                                                <p className="text-[9px] font-black text-rose-500 uppercase italic tracking-wider">{e.team}</p>
                                                                <h3 className="font-bold text-slate-800 text-sm truncate uppercase">{e.doctorName}</h3>
                                                                <p className="text-[10px] text-slate-500 font-bold uppercase truncate">R$ {e.value} • {e.requesterName}</p>
                                                            </div>
                                                            <button onClick={() => setDeleteTarget(e)} className="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center active:bg-rose-600 active:text-white transition-all shadow-sm active:scale-90">
                                                                <i className="ph-bold ph-trash text-lg"></i>
                                                            </button>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around p-3 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
                        <button onClick={() => setView('form')} className={`flex flex-col items-center gap-1 p-2 transition-all active:scale-90 active:bg-slate-50 rounded-xl ${view === 'form' ? 'text-emerald-600 scale-110' : 'text-slate-400'}`}>
                            <i className={`ph-fill ph-plus-circle text-2xl`}></i>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Novo</span>
                        </button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1 p-2 transition-all active:scale-90 active:bg-slate-50 rounded-xl ${view === 'history' ? 'text-emerald-600 scale-110' : 'text-slate-400'}`}>
                            <i className={`ph-fill ph-clock-counter-clockwise text-2xl`}></i>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Feed</span>
                        </button>
                        <div className="w-[1px] h-8 bg-slate-200 self-center"></div>
                        <button onClick={() => setView('admin')} className={`flex flex-col items-center gap-1 p-2 transition-all active:scale-90 active:bg-slate-50 rounded-xl ${view === 'admin' ? 'text-slate-900 scale-110' : 'text-slate-400'}`}>
                            <i className={`ph-fill ph-shield-check text-2xl`}></i>
                            <span className="text-[9px] font-black uppercase tracking-tighter">Gestor</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
