            ],
            "DISTRITAL SUL": [

                "TATIANA RODRIGUES DA FONSECA", "MEIRE TEREZINHA LEMES FERNANDES", "LAURO FERREIRA JUNIOR",
                "JULIANA STEFANIE OLIVEIRA", "THIAGO TOMAZZONI FERRARI", "TATIANE FERRARI", "DANNY MELO PEREIRA"
            ],
            "GERENTE NACIONAL DE VISITAÇÃO MÉDICA": ["BRUNO JORGE"],
            "GERENTE NACIONAL DE EXECUÇÃO": ["GUSTAVO LIMA"],
            "DIRETORIA (MATRIZ)": ["CARLOS OTAVIO"]
        };

        const ACTION_TYPES = ['DIAS DE PRODUTO', 'PRESENTE', 'REFEIÇÃO', 'CONGRESSO', 'ORGANIZAÇÃO DE AMOSTRAS'];
        const CATEGORIES = ['CAT 1', 'CAT 2', 'CAT 3', 'CAT 4'];
        
        const ADMIN_USERS = {
            "8888": { name: "CARLOS OTÁVIO", isGeneral: true, team: "DIRETORIA (MATRIZ)" }
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [entries, setEntries] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('form'); 
            const [status, setStatus] = useState({ type: '', msg: '' });
            const [currentAdmin, setCurrentAdmin] = useState(null);
            const [pinInput, setPinInput] = useState('');
            const [adminTab, setAdminTab] = useState('reports'); 
            const [adminGeneralFilter, setAdminGeneralFilter] = useState('ALL');
            const [deleteTarget, setDeleteTarget] = useState(null);

            const [formData, setFormData] = useState({
                team: '', requesterName: '', doctorName: '', crm: '', category: '', actionType: '', value: '', observations: ''
            });

            // Ícone dinâmico
            useEffect(() => {
                const canvas = document.createElement('canvas');
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                if (ctx) {
                    const grad = ctx.createLinearGradient(0, 0, 1024, 1024);
                    grad.addColorStop(0, '#059669'); grad.addColorStop(1, '#10b981');
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(0, 0, 1024, 1024, 200); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = 'italic bold 550px serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('PF', 512, 512 + 40);
                    const iconUrl = canvas.toDataURL('image/png');
                    let link = document.querySelector('link[rel="apple-touch-icon"]') || document.createElement('link');
                    link.rel = 'apple-touch-icon'; link.href = iconUrl; document.head.appendChild(link);
                }
            }, []);

            const notify = (msg, type = 'success') => {
                setStatus({ type, msg });
                setTimeout(() => setStatus({ type: '', msg: '' }), 4000);
            };

            useEffect(() => {
                signInAnonymously(auth).catch(() => notify("Erro de ligação", "error"));
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                setLoading(true);
                const colRef = collection(db, COLLECTION_NAME);
                const unsubscribe = onSnapshot(colRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => {
                        const d = doc.data();
                        let date = new Date();
                        if (d.createdAt) date = d.createdAt.toDate ? d.createdAt.toDate() : new Date(d.createdAt);
                        return { id: doc.id, ...d, createdAt: date };
                    });
                    setEntries([...data].sort((a, b) => b.createdAt - a.createdAt));
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const parseCurrency = (valStr) => parseFloat(String(valStr).replace(/\./g, '').replace(',', '.')) || 0;

            const filteredEntries = useMemo(() => {
                if (!currentAdmin) return [];
                if (currentAdmin.isGeneral) {
                    if (adminGeneralFilter === 'MINE') return entries.filter(e => e.team === currentAdmin.team);
                    if (adminGeneralFilter !== 'ALL') return entries.filter(e => e.team === adminGeneralFilter);
                    return entries;
                }
                return entries.filter(e => e.team === currentAdmin.team);
            }, [entries, currentAdmin, adminGeneralFilter]);

            const countEntries = filteredEntries.length;
            const totalInvested = useMemo(() => filteredEntries.reduce((acc, curr) => acc + parseCurrency(curr.value), 0), [filteredEntries]);

            const statsByTeam = useMemo(() => {
                const groups = filteredEntries.reduce((acc, curr) => {
                    const team = curr.team || "SEM ESTRUTURA";
                    if (!acc[team]) acc[team] = { total: 0, count: 0 };
                    acc[team].total += parseCurrency(curr.value);
                    acc[team].count += 1;
                    return acc;
                }, {});
                return Object.entries(groups).map(([name, data]) => ({ name, ...data })).sort((a, b) => b.total - a.total);
            }, [filteredEntries]);

            const statsByUser = useMemo(() => {
                const groups = filteredEntries.reduce((acc, curr) => {
                    const name = curr.requesterName || "N/A";
                    if (!acc[name]) acc[name] = { total: 0, count: 0 };
                    acc[name].total += parseCurrency(curr.value);
                    acc[name].count += 1;
                    return acc;
                }, {});
                return Object.entries(groups).map(([name, data]) => ({ name, ...data })).sort((a, b) => b.total - a.total);
            }, [filteredEntries]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { team, requesterName, doctorName, value, observations, crm, category, actionType } = formData;
                if (!team || !requesterName || !doctorName || !value || !observations || !crm || !category || !actionType) {
                    return alert("Preencha todos os campos obrigatórios.");
                }
                try {
                    await addDoc(collection(db, COLLECTION_NAME), { ...formData, userId: user.uid, createdAt: new Date() });
                    setFormData({ ...formData, requesterName: '', doctorName: '', crm: '', value: '', observations: '', category: '', actionType: '' });
                    notify("REGISTADO COM SUCESSO!");
                    setView('history');
                } catch (err) { alert("Erro ao gravar: " + err.message); }
            };

            const confirmDelete = async () => {
                if (!deleteTarget) return;
                try {
                    setEntries(prev => prev.filter(e => e.id !== deleteTarget.id));
                    await deleteDoc(doc(db, COLLECTION_NAME, deleteTarget.id));
                    setDeleteTarget(null);
                    notify("LANÇAMENTO REMOVIDO.");
                } catch (err) { alert("Erro ao excluir."); }
            };

            const logoutAdmin = () => { setCurrentAdmin(null); setPinInput(''); };
            const currentReps = REPRESENTATIVES[formData.team] || [];

            return (
                <div className="min-h-screen bg-slate-100 pb-24 text-slate-900 font-sans">
                    
                    {/* MODAL DE CONFIRMAÇÃO DE EXCLUSÃO */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 animate-in fade-in duration-200">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setDeleteTarget(null)}></div>
                            <div className="relative bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl p-8 animate-in zoom-in-95 border border-slate-100">
                                <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <i className="ph-fill ph-warning-octagon text-4xl"></i>
                                </div>
                                <h3 className="text-xl font-black text-slate-800 text-center mb-2 tracking-tight uppercase">Apagar Lançamento?</h3>
                                <p className="text-[12px] text-slate-500 text-center mb-6 italic px-4 leading-snug">
                                    Deseja apagar o registo de <strong className="text-slate-800">{deleteTarget.doctorName}</strong> (R$ {deleteTarget.value})?
                                </p>
                                <div className="space-y-3">
                                    <button onClick={confirmDelete} className="w-full bg-rose-600 text-white font-black py-4 rounded-2xl active:scale-95 transition-all shadow-lg uppercase text-xs">Sim, Apagar Agora</button>
                                    <button onClick={() => setDeleteTarget(null)} className="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl active:scale-95 transition-all uppercase text-xs">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="sticky top-0 z-50 bg-slate-900 p-4 border-b border-slate-800 shadow-xl text-white">
                        <div className="max-w-md mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-emerald-500 rounded-xl flex items-center justify-center font-black italic shadow-lg text-white">PF</div>
                                <div>
                                    <h1 className="text-sm font-black tracking-tight uppercase leading-none">Pierre Fabre</h1>
                                    <p className="text-[9px] text-emerald-400 font-bold tracking-[0.3em] uppercase mt-1">Corporate Brasil</p>
                                </div>
                            </div>
                            <i className="ph-bold ph-file-csv text-emerald-400 text-xl cursor-pointer"></i>
                        </div>
                    </header>

                    {status.msg && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-emerald-900 text-emerald-100 px-6 py-3 rounded-full shadow-2xl border border-emerald-700 font-bold text-xs animate-bounce uppercase">
                            {status.msg}
                        </div>
                    )}

                    <main className="max-w-md mx-auto p-4">
                        {view === 'form' && (
                            <div className="bg-white rounded-3xl p-6 shadow-2xl border border-slate-100 animate-in fade-in zoom-in-95">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                                    <i className="ph-bold ph-plus-circle text-emerald-500"></i> Nova Solicitação
                                </h2>
                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-widest italic">Sua Estrutura</label>
                                        {/* REDUZIDO: Apenas na lista suspensa select */}
                                        <select value={formData.team} onChange={e => setFormData({...formData, team: e.target.value, requesterName: ''})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-[10px] outline-none focus:ring-2 focus:ring-emerald-500 active:scale-[0.98] transition-all uppercase">
                                            <option value="">SELECIONAR ESTRUTURA...</option>
                                            {TEAMS.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-widest italic">Seu Nome (Solicitante)</label>
                                        {currentReps.length > 0 ? (
                                            /* REDUZIDO: Apenas na lista suspensa select */
                                            <select value={formData.requesterName} onChange={e => setFormData({...formData, requesterName: e.target.value})} className="w-full p-4 bg-emerald-50 border border-emerald-200 rounded-2xl font-bold text-[10px] outline-none focus:ring-2 focus:ring-emerald-500 transition-all shadow-inner uppercase">
                                                <option value="">SELECIONAR SEU NOME...</option>
                                                {currentReps.map(name => <option key={name} value={name}>{name}</option>)}
                                                <option value="OUTRO">OUTRO (MANUAL)</option>
                                            </select>
                                        ) : (
                                            /* ORIGINAL: Input volta ao tamanho legível sm/xs */
                                            <input value={formData.requesterName} onChange={e => setFormData({...formData, requesterName: e.target.value})} placeholder={formData.team ? "DIGITE SEU NOME COMPLETO" : "ESCOLHA A ESTRUTURA"} disabled={!formData.team} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none uppercase" />
                                        )}
                                    </div>
                                    <input value={formData.doctorName} onChange={e => setFormData({...formData, doctorName: e.target.value})} placeholder="NOME DO MÉDICO / DESTINATÁRIO" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all uppercase" />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input value={formData.crm} onChange={e => setFormData({...formData, crm: e.target.value})} placeholder="CRM/UF" className="p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm outline-none uppercase focus:ring-2 focus:ring-emerald-500 transition-all" />
                                        <input value={formData.value} onChange={e => {
                                            let v = e.target.value.replace(/\D/g, "");
                                            v = (Number(v) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                                            setFormData({...formData, value: v});
                                        }} placeholder="R$ 0,00" className="p-4 bg-emerald-50 border border-emerald-200 rounded-2xl font-black text-emerald-800 text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition-all" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        {/* REDUZIDO: Apenas na lista suspensa select */}
                                        <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="p-4 bg-slate-50 border border-slate-200 rounded-2xl text-[10px] font-bold focus:ring-2 focus:ring-emerald-500 transition-all uppercase">
                                            <option value="">CATEGORIA...</option>
                                            {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <select value={formData.actionType} onChange={e => setFormData({...formData, actionType: e.target.value})} className="p-4 bg-slate-50 border border-slate-200 rounded-2xl text-[10px] font-bold focus:ring-2 focus:ring-emerald-500 transition-all uppercase">
                                            <option value="">AÇÃO...</option>
                                            {ACTION_TYPES.map(a => <option key={a} value={a}>{a}</option>)}
                                        </select>
                                    </div>
                                    <textarea value={formData.observations} onChange={e => setFormData({...formData, observations: e.target.value})} placeholder="DETALHE A AÇÃO AQUI..." rows="3" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-medium outline-none focus:ring-2 focus:ring-emerald-500 transition-all uppercase" />
                                    <button type="submit" className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-[0.96] transition-all flex items-center justify-center gap-2 uppercase text-sm">
                                        <i className="ph-bold ph-check-circle text-emerald-400 text-lg"></i> REGISTAR SOLICITAÇÃO
                                    </button>
                                </form>
                            </div>
                        )}
                        {view === 'history' && (
                            <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-500">
                                <div className="flex justify-between items-center px-2">
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-widest">Feed de Atividades</h2>
                                    <span className="bg-slate-200 text-slate-600 text-[10px] font-black px-2 py-1 rounded-md tracking-tighter uppercase">{entries.length} LANÇAMENTOS</span>
                                </div>
                                {entries.map(e => (
                                    <div key={e.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:scale-[0.98] transition-all">
                                        <div className="min-w-0 pr-4 text-left">
                                            <span className="text-[9px] font-black text-emerald-600 uppercase bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-100">{e.team}</span>
                                            <h3 className="font-bold text-slate-800 text-sm truncate mt-1 uppercase leading-tight">{e.doctorName}</h3>
                                            <p className="text-[10px] text-slate-500 font-bold uppercase truncate">{e.requesterName} • {e.actionType}</p>
                                        </div>
                                        <div className="text-right shrink-0">
                                            <p className="font-black text-slate-900 text-sm uppercase">R$ {e.value}</p>
                                            <p className="text-[9px] text-slate-400 font-bold">{e.createdAt.toLocaleDateString()}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        {view === 'admin' && (
                            <div className="animate-in fade-in duration-500">
                                {!currentAdmin ? (
                                    <div className="bg-white p-8 rounded-3xl shadow-2xl text-center border border-slate-100 mt-10">
                                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><i className="ph-fill ph-shield-check text-4xl"></i></div>
                                        <h2 className="text-xl font-black text-slate-800 mb-2 tracking-tight italic uppercase font-serif">Portal do Gestor</h2>
                                        <form onSubmit={e => { e.preventDefault(); if (ADMIN_USERS[pinInput]) { setCurrentAdmin(ADMIN_USERS[pinInput]); setPinInput(''); } else { alert("PIN INCORRETO"); } }} className="space-y-4">
                                            <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="PIN" className="w-full p-5 bg-slate-100 rounded-2xl text-center text-3xl font-black tracking-[0.5em] outline-none border-2 border-transparent focus:border-emerald-500 uppercase" maxLength={6} />
                                            <button type="submit" className="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-sm">ENTRAR NO PAINEL</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="bg-slate-900 text-white p-5 rounded-3xl shadow-xl flex justify-between items-center transition-all active:scale-[0.98]">
                                            <div><p className="text-[9px] font-black text-emerald-400 uppercase tracking-widest leading-none mb-1 italic">GESTÃO NACIONAL</p><h3 className="font-bold text-sm tracking-tight uppercase">{currentAdmin.name}</h3></div>
                                            <button onClick={logoutAdmin} className="text-[10px] font-black uppercase bg-slate-800 text-slate-400 px-3 py-2 rounded-xl active:scale-90 shadow-md">SAIR</button>
                                        </div>
                                        <div className="flex bg-slate-200 p-1 rounded-2xl shadow-inner text-center">
                                            <button onClick={() => setAdminTab('reports')} className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${adminTab === 'reports' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>Relatórios</button>
                                            <button onClick={() => setAdminTab('manage')} className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${adminTab === 'manage' ? 'bg-white text-rose-600 shadow-sm' : 'text-slate-500'}`}>Controle</button>
                                        </div>
                                        {adminTab === 'reports' ? (
                                            <div className="space-y-6 animate-in slide-in-from-right-4 duration-300">
                                                <select value={adminGeneralFilter} onChange={e => setAdminGeneralFilter(e.target.value)} className="w-full p-3 bg-slate-900 text-white rounded-xl font-bold text-[10px] outline-none shadow-lg active:scale-[0.98] transition-all uppercase">
                                                    <option value="ALL">🌎 VISÃO GERAL BRASIL</option>
                                                    <option value="MINE">👤 MINHA EQUIPE</option>
                                                    {TEAMS.map(t => <option key={t} value={t}>📍 {t}</option>)}
                                                </select>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 text-center uppercase"><p className="text-[9px] font-black text-slate-400 mb-1">Verba Consumida</p><h4 className="text-lg font-black text-emerald-600 leading-none">R$ {Number(totalInvested).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</h4></div>
                                                    <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 text-center uppercase"><p className="text-[9px] font-black text-slate-400 mb-1">Lançamentos</p><h4 className="text-2xl font-black text-slate-800 leading-none">{countEntries}</h4></div>
                                                </div>
                                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                                    <h3 className="text-[10px] font-black text-slate-800 uppercase tracking-[0.2em] mb-6 flex items-center gap-2"><i className="ph-bold ph-map-pin text-emerald-500 text-lg"></i> Ranking por Estrutura</h3>
                                                    <div className="space-y-5">
                                                        {statsByTeam.map((s, i) => (
                                                            <div key={i} className="space-y-2 animate-in slide-in-from-left-2 duration-300">
                                                                <div className="flex justify-between text-[11px] font-bold uppercase"><span className="text-slate-600 truncate pr-4 leading-none">{s.name}</span><span className="text-emerald-700 font-black shrink-0">R$ {Number(s.total).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span></div>
                                                                <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden shadow-inner"><div className="bg-emerald-500 h-full rounded-full transition-all duration-1000" style={{ width: totalInvested > 0 ? `${(s.total/totalInvested)*100}%` : '0%' }}></div></div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="space-y-4 animate-in slide-in-from-left-4 duration-300">
                                                <div className="bg-rose-50 border border-rose-100 p-4 rounded-2xl flex gap-3 shadow-sm italic text-rose-700 text-[10px] font-bold uppercase leading-tight"><i className="ph-fill ph-warning-circle text-rose-500 text-xl shrink-0"></i>Moderação: A exclusão de lançamentos é definitiva.</div>
                                                {filteredEntries.map(e => (
                                                    <div key={e.id} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:scale-[0.98] transition-all">
                                                        <div className="min-w-0 pr-4 text-left"><p className="text-[9px] font-black text-rose-500 uppercase italic tracking-wider">{e.team}</p><h3 className="font-bold text-slate-800 text-sm truncate uppercase leading-tight">{e.doctorName}</h3><p className="text-[10px] text-slate-500 font-bold uppercase truncate">R$ {e.value} • {e.requesterName}</p></div>
                                                        <button onClick={() => setDeleteTarget(e)} className="w-10 h-10 bg-rose-50 text-rose-600 rounded-xl flex items-center justify-center shadow-sm active:scale-90"><i className="ph-bold ph-trash text-lg"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around p-3 z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.08)]">
                        <button onClick={() => setView('form')} className={`flex flex-col items-center gap-1 p-2 transition-all active:scale-90 active:bg-slate-50 rounded-xl ${view === 'form' ? 'text-emerald-600 scale-110' : 'text-slate-400'}`}><i className="ph-fill ph-plus-circle text-2xl"></i><span className="text-[9px] font-black uppercase tracking-tighter">Novo</span></button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1 p-2 transition-all active:scale-90 active:bg-slate-50 rounded-xl ${view === 'history' ? 'text-emerald-600 scale-110' : 'text-slate-400'}`}><i className="ph-fill ph-clock-counter-clockwise text-2xl"></i><span className="text-[9px] font-black uppercase tracking-tighter">Feed</span></button>
                        <div className="w-[1px] h-8 bg-slate-200 self-center"></div>
                        <button onClick={() => setView('admin')} className={`flex flex-col items-center gap-1 p-2 transition-all active:scale-90 active:bg-slate-50 rounded-xl ${view === 'admin' ? 'text-slate-900 scale-110' : 'text-slate-400'}`}><i className="ph-fill ph-shield-check text-2xl"></i><span className="text-[9px] font-black uppercase tracking-tighter">Gestor</span></button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
